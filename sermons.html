<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IGNITE CHURCH Messages</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
}

/* Header bar */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  flex-wrap: wrap;
}

.header-bar h2 {
  margin: 0;
}

/* Subscribe button */
.subscribe-btn {
  background: #ff0000;
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s ease;
}

.subscribe-btn:hover {
  background: #cc0000;
}

/* Video container */
.video-container {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  max-width: 100%;
}

.video-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* Playlist section */
.playlist-section {
  margin-top: 24px;
}

</style>
</head>

<body>

<div class="header-bar">
  <h2>Latest Message</h2>

  <a
    class="subscribe-btn"
    href="https://www.youtube.com/@IgniteChurchatLakewoood?sub_confirmation=1"
    target="_blank"
  >
    Subscribe on YouTube
  </a>
</div>

<!-- Latest video auto-load (playlist newest first) -->

<div class="video-container">
  <iframe
    src="https://www.youtube.com/embed/videoseries?list=PLFY9Qg6Q2KTAwqgVoD6ZHIRq8hoKJnbRh&index=1"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>


<!-- Optional: show full playlist below -->

<div class="playlist-section">

  <div class="header-bar">
    <h2>Browse Messages</h2>
  </div>

  <div class="video-container">
    <iframe
      src="https://www.youtube.com/embed/videoseries?list=PLFY9Qg6Q2KTAwqgVoD6ZHIRq8hoKJnbRh"
      allowfullscreen>
    </iframe>
  </div>

</div>

</body>
</html>
