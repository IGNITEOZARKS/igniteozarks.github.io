<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IGNITE CHURCH</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #ffffff;
}

.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.subscribe-btn {
  background: #ff0000;
  color: white;
  padding: 10px 18px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
}

.subscribe-btn:hover {
  background: #cc0000;
}

.video-container {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}

.video-container iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
}
</style>

</head>

<body>

<div class="header-bar">
  <h2>Latest Message</h2>

  <a
    class="subscribe-btn"
    href="https://www.youtube.com/@IgniteChurchatLakewoood?sub_confirmation=1"
    target="_blank"
  >
    Subscribe on YouTube
  </a>
</div>

<div class="video-container">
  <iframe
    src="https://www.youtube.com/embed?listType=user_uploads&list=IgniteChurchatLakewoood"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
