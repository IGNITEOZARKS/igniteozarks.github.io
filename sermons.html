<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IGNITE CHURCH</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f4f4f4;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .video-box iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .sub-section {
            margin-top: 25px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn-sub {
            display: inline-block;
            background: #ff0000;
            color: #fff;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .btn-sub:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-box">
        <iframe
            src="https://www.youtube.com/embed/videoseries?list=PLFY9Qg6Q2KTAwqgVoD6ZHIRq8hoKJnbRh"
            title="Ignite Church Sermons"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
        </iframe>
    </div>

    <div class="sub-section">
        <h3>Join Our Community</h3>
        <a href="https://www.youtube.com/@IgniteChurchatLakewoood?sub_confirmation=1"
           class="btn-sub"
           target="_blank"
           rel="noopener noreferrer">
            SUBSCRIBE ON YOUTUBE
        </a>
    </div>
</div>

</body>
</html>
