<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IGNITE CHURCH</title>
    
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .video-wrapper {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .playlist-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .playlist-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .subscribe-panel {
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <div class="playlist-container">
            <iframe 
                src="https://www.youtube.com/embed/videoseries?list=UUFY9Qg6Q2KTAwqgVoD6ZHIRq8hoKJnbRh" 
                title="Ignite Church Latest Video" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="subscribe-panel">
        <h3>Join us on YouTube</h3>
        <script src="https://apis.google.com/js/platform.js"></script>
        <div class="g-ytsubscribe" data-channelid="UCFY9Qg6Q2KTAwqgVoD6ZHIRq8hoKJnbRh" data-layout="full" data-count="default"></div>
    </div>

</body>
</html>
